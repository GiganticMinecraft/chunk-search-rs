name: Build and publish docker image
on:
  push:
    branches:
      - main
jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
          # see #73
          - target: aarch64-apple-darwin
          # see #74
            runner: macos-latest
    name: Build binary
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@master
        with:
          submodules: recursive
          fetch-depth: '0'
      - name: Setup Rust toolchain
        # tag "stable" refers Rust's stable version (intentionally sliding)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: ${{ matrix.target }}
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Restore build artifact cache
        uses: Swatinem/rust-cache@v2
      - name: Build artifact
        run:
          cargo build --target ${{ matrix.target }} --release
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      - name: Debug output
        run: |
          du '${{ github.workspace }}/target/${{ matrix.target }}/release/chunk-search-rs'
          file '${{ github.workspace }}/target/${{ matrix.target }}/release/chunk-search-rs'
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: bin_${{ matrix.target }}
          path: ${{ github.workspace }}/target/${{ matrix.target }}/release/chunk-search-rs
  push_tag:
    needs: build
    runs-on: ubuntu-latest
    name: Push tag
    outputs:
      new_tag: ${{ steps.bump_version.outputs.new_tag }}
    steps:
      # to push tag correctly, entire history is needed!!
      - uses: actions/checkout@master
        with:
          submodules: recursive
          fetch-depth: '0'
      - name: Bump version and push tag
        uses: anothrNick/github-tag-action@1.75.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: "patch"
          WITH_V: true
          DEFAULT_BRANCH: "main"
        id: bump_version
  release:
    strategy:
      max-parallel: 1
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - aarch64-apple-darwin
    needs: push_tag
    runs-on: ubuntu-latest
    name: Release
    steps:
      - name: Download
        uses: actions/download-artifact@v7
        id: download
        with:
          name: bin_${{ matrix.target }}
          path: ${{ github.workspace }}
      - name: Debug output of downloaded artifact
        run: |
          find '${{ steps.download.outputs.download-path }}' -type f
      - name: Prepare release
        run: |
          mv ${{ github.workspace }}/chunk-search-rs ${{ github.workspace }}/chunk-search-rs_${{ matrix.target }}
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.workspace }}/chunk-search-rs_${{ matrix.target }}
          draft: false
          prerelease: false
          tag_name: ${{ needs.push_tag.outputs.new_tag }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  publish-docker-image:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
    env:
      image_name: chunk-search-rs
    steps:
      - uses: actions/checkout@v6
      - name: Download amd64 binary
        uses: actions/download-artifact@v7
        with:
          name: bin_x86_64-unknown-linux-gnu
          path: ${{ github.workspace }}/docker-context/linux/amd64
      - name: Download arm64 binary
        uses: actions/download-artifact@v7
        with:
          name: bin_aarch64-unknown-linux-gnu
          path: ${{ github.workspace }}/docker-context/linux/arm64
      - name: Make binaries executable
        run: |
          chmod +x ${{ github.workspace }}/docker-context/linux/amd64/chunk-search-rs
          chmod +x ${{ github.workspace }}/docker-context/linux/arm64/chunk-search-rs
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.image_name }}
          tags: |
            type=sha,prefix=sha-,suffix=,format=short
            type=raw,value=latest
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ github.workspace }}/docker-context
          file: ./docker/multi-arch/Dockerfile
          builder: ${{ steps.buildx.outputs.name }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true
      - name: Prepare lowercase image reference
        id: image_ref
        run: |
          echo "image_ref=ghcr.io/${OWNER,,}/${{ env.image_name }}" >> "$GITHUB_OUTPUT"
        env:
          OWNER: ${{ github.repository_owner }}
      - name: Sign container image with Cosign
        run: |
          cosign sign --yes \
            ${{ steps.image_ref.outputs.image_ref }}@${{ steps.build.outputs.digest }}
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image_ref.outputs.image_ref }}@${{ steps.build.outputs.digest }}
          format: 'sarif'
          output: 'trivy-results.sarif'
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && steps.build.outputs.digest != ''
        with:
          sarif_file: 'trivy-results.sarif'
